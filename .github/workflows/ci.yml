name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elim_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up environment variables
      run: |
        echo "DEBUG=True" > backend/.env
        echo "SECRET_KEY=test-secret-key-for-ci-only-not-used-in-prod" >> backend/.env
        echo "DB_NAME=elim_test_db" >> backend/.env
        echo "DB_USER=postgres" >> backend/.env
        echo "DB_PASSWORD=postgres" >> backend/.env
        echo "DB_HOST=localhost" >> backend/.env
        echo "DB_PORT=5432" >> backend/.env
        echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> backend/.env
        echo "CELERY_RESULT_BACKEND=redis://localhost:6379/0" >> backend/.env
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> backend/.env

    - name: Run Django system checks
      run: |
        cd backend
        python manage.py check

    - name: Run migrations
      run: |
        cd backend
        python manage.py migrate

    - name: Run tests
      run: |
        cd backend
        python manage.py test --verbosity=2

    - name: Generate coverage report
      run: |
        cd backend
        coverage run --source='.' manage.py test
        coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run linting
      run: |
        cd frontend
        npm run lint

    - name: Run type checking
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

    - name: Build production bundle
      run: |
        cd frontend
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Bandit Security Scan (Python)
      run: |
        pip install bandit
        bandit -r backend/ -f json -o bandit-report.json || true

    - name: Run npm audit (Node.js)
      run: |
        cd frontend
        npm audit --audit-level=critical

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.prod
        push: false
        tags: elim-backend:test

    - name: Build frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.prod
        push: false
        tags: elim-frontend:test

    - name: Test Docker Compose
      run: |
        echo "SECRET_KEY=test-secret-key-for-ci-only" > .env
        echo "POSTGRES_PASSWORD=test-password" >> .env
        echo "ALLOWED_HOSTS=localhost" >> .env
        echo "CORS_ALLOWED_ORIGINS=http://localhost" >> .env
        echo "CSRF_TRUSTED_ORIGINS=http://localhost" >> .env
        echo "REACT_APP_API_URL=/api/v1" >> .env
        docker compose -f docker-compose.synology.yml config

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up environment file
      run: |
        echo "SECRET_KEY=test-secret-key-for-integration" > .env
        echo "POSTGRES_PASSWORD=test-password" >> .env
        echo "DB_NAME=elim_test_db" >> .env
        echo "DB_USER=postgres" >> .env
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env
        echo "CORS_ALLOWED_ORIGINS=http://localhost" >> .env
        echo "CSRF_TRUSTED_ORIGINS=http://localhost" >> .env
        echo "REACT_APP_API_URL=/api/v1" >> .env
        echo "FRONTEND_PORT=3000" >> .env
        echo "BACKEND_PORT=8000" >> .env

    - name: Build and start services
      run: |
        docker compose -f docker-compose.synology.yml up -d --build
        sleep 60

    - name: Run integration tests
      run: |
        curl -f http://localhost:8000/api/health/ || exit 1
        curl -f http://localhost:3000/ || exit 1
        curl -f -L http://localhost:8000/admin/ || exit 1

    - name: Clean up
      if: always()
      run: |
        docker compose -f docker-compose.synology.yml down -v

  deployment-check:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check deployment files
      run: |
        test -f docker-compose.synology.yml || exit 1
        test -f .env.synology || exit 1
        test -f scripts/synology_backup.sh || exit 1
        test -f scripts/synology_restore.sh || exit 1
        echo "All deployment files present ✅"

    - name: Validate Docker Compose
      run: |
        echo "SECRET_KEY=production-ready-secret-key-placeholder" > .env
        echo "POSTGRES_PASSWORD=secure-production-password-placeholder" >> .env
        echo "ALLOWED_HOSTS=example.com,www.example.com" >> .env
        echo "CORS_ALLOWED_ORIGINS=https://example.com" >> .env
        echo "CSRF_TRUSTED_ORIGINS=https://example.com" >> .env
        docker compose -f docker-compose.synology.yml config > /dev/null
        rm -f .env
        echo "Docker Compose configuration valid ✅"

    - name: Check security configurations
      run: |
        if grep -q "SECRET_KEY=" .gitignore; then
          echo "❌ .gitignore should not contain actual secret keys"
          exit 1
        fi
        if [ -f ".env" ]; then
          echo "❌ .env file should not be committed"
          exit 1
        fi
        echo "Security configurations valid ✅"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan, docker-build]
    if: success() && github.ref == 'refs/heads/main'

    steps:
    - name: Success notification
      run: |
        echo "All tests passed! Ready for deployment to production."
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
