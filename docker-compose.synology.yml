version: '3.8'

services:
  # PostgreSQL Database - Production Configuration
  db:
    image: postgres:15-alpine
    container_name: elim_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elim_db}
      POSTGRES_USER: ${POSTGRES_USER:-elimuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - elim_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elimuser} -d ${POSTGRES_DB:-elim_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis for Celery - Production Configuration
  redis:
    image: redis:7-alpine
    container_name: elim_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - elim_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Django Backend - Production Configuration
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: elim_backend_prod
    restart: unless-stopped
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn elim_backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --max-requests 1000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - ./logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,your-synology-ip}
      - DB_NAME=${POSTGRES_DB:-elim_db}
      - DB_USER=${POSTGRES_USER:-elimuser}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elim_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # React Frontend - Production Configuration
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: elim_frontend_prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://your-synology-ip:8000/api/v1}
    depends_on:
      - backend
    networks:
      - elim_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Celery Worker - Production Configuration
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: elim_celery_prod
    restart: unless-stopped
    command: celery -A elim_backend worker --loglevel=info --concurrency=2 --max-tasks-per-child=1000
    volumes:
      - backend_media:/app/media
      - ./logs:/app/logs
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${POSTGRES_DB:-elim_db}
      - DB_USER=${POSTGRES_USER:-elimuser}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elim_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: elim_nginx_prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - elim_network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/elim/postgres_data
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/elim/redis_data
  backend_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/elim/static
  backend_media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/elim/media

networks:
  elim_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16